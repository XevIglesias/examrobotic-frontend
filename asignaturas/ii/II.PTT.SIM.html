        <div style="background:#fff;border-radius:16px;width:100%;max-width:400px;padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
            <button onclick="closeAuth()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1">&#x2715;</button>

            <div style="display:flex;gap:8px;margin-bottom:24px">
                <button id="tab-login" onclick="switchTab('login')" class="tab-active" style="flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:0.875rem;transition:all 0.15s">Entrar</button>
                <button id="tab-register" onclick="switchTab('register')" style="flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:0.875rem;transition:all 0.15s">Registrarse</button>
            </div>

            <p id="auth-error" style="color:#ef4444;font-size:0.8rem;font-weight:600;min-height:1.2em;margin-bottom:8px"></p>

            <form id="form-login" onsubmit="doLogin(event)" style="display:flex;flex-direction:column;gap:12px">
                <input id="auth-email" type="email" placeholder="Correo electr&oacute;nico" required style="padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.9rem;outline:none">
                <input id="auth-password" type="password" placeholder="Contrase&ntilde;a" required style="padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.9rem;outline:none">
                <button id="btn-login" type="submit" style="padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;margin-top:4px">Entrar</button>
            </form>

            <form id="form-register" onsubmit="doRegister(event)" style="display:none;flex-direction:column;gap:12px">
