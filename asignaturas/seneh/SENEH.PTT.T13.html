<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simulacro de examen del Grado Superior de Rob&oacute;tica y Automatizaci&oacute;n Industrial. 40 preguntas aleatorias con temporizador y correcci&oacute;n autom&aacute;tica.">
    <link rel="icon" href="../../assets/img/favicon.svg?v=2" type="image/svg+xml">
<title>EXAMROBOTIC - Test Tema 13: Hidr&aacute;ulica aplicada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/quiz.css?v=5">
<script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/js/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col">

                                                <header class="bg-white border-b border-border sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8 h-20 grid grid-cols-3 items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/'">
                <div class="relative">
                    <img src="../../assets/img/robot-avatar.png" class="w-12 h-12 rounded-xl object-cover shadow-lg shadow-primary/20 border border-blue-100" alt="Logo">
                    
                </div>
                <div>
                    <h1 class="text-2xl font-black text-foreground leading-none">EXAM<span class="text-primary">ROBOTIC</span></h1>
                    <p class="text-[10px] font-bold text-muted uppercase tracking-widest mt-1">Plataforma Test</p>
                </div>
            </div>
                        <!-- Progreso (centro) -->
            <div class="flex flex-col items-center justify-center gap-1.5">
                <span id="q-progress" class="text-[11px] font-extrabold text-primary uppercase tracking-widest">Cargando...</span>
                <div class="h-2 w-52 bg-gray-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-primary transition-all duration-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <!-- Timer (derecha) -->
            <div class="flex items-center justify-end">
                <div id="timer" class="timer-box">50:00</div>
                <div id="auth-header-area"></div>
            </div>
        </div>
    </header>

<main class="flex-grow w-full py-10">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col xl:flex-row gap-8">
            
                        <!-- Sidebar Izquierdo (Publicidad) -->
            <aside class="hidden xl:block w-[180px] shrink-0">
                <div class="sticky top-24">
                    <div class="bg-gray-50 border-2 border-dashed border-gray-200 h-[600px] flex flex-col items-center justify-center text-center p-4 rounded-2xl">
                        <div class="text-gray-400">
                            <p class="text-[10px] font-bold uppercase tracking-widest mb-2 opacity-60">Publicidad</p>
                            <div class="w-10 h-10 bg-gray-200 rounded-full mb-4 mx-auto flex items-center justify-center">
                                <span class="text-lg">??</span>
                            </div>
                            <p class="text-[10px] italic leading-tight">Banner Lateral<br>Izquierdo</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Contenido Principal -->
            <div class="flex-grow min-w-0">
                <div id="quiz">
                    <div class="q-card">
                        <div id="q-unit" class="q-meta">UNIDAD 13</div>
                        <div id="q-text" class="q-text">Cargando...</div>
                        <div id="options-area" style="display: grid; gap: 10px;"></div>
                        <div id="explanation" class="exp-box"></div>
                    </div>
                    
                    <div class="nav-footer">
                        <button class="btn" style="background:#e2e8f0; color: #333;" onclick="move(-1)">Anterior</button>
                        <button class="btn btn-next" id="btn-next" onclick="move(1)">Siguiente</button>
                        <button class="btn btn-finish" id="btn-finish" style="display:none" onclick="finish()">Finalizar Examen</button>
                        <button class="btn" id="btn-menu-review" style="display:none; background: var(--primary); color: white;" onclick="window.history.back()">Volver al Men&uacute;</button>
                    </div>

                    <div class="dot-grid" id="dot-grid"></div>
                </div>

                <div id="results" style="display:none">
                    <p style="font-weight: 800; color: var(--accent); letter-spacing: 2px; text-align: center;">NOTA FINAL</p>
                    <div class="score-badge" id="res-score" style="text-align: center;">0.0</div>
                    <div class="score-sub" id="res-msg" style="text-align: center;">Resultado</div>
                    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 40px; flex-wrap: wrap;">
                        <button class="btn btn-next" style="max-width:250px; background: var(--accent);" onclick="showReview()">Revisar Errores</button>
                        <button class="btn" style="max-width:250px; background:#e2e8f0; color: #333;" onclick="location.reload()">Generar Nuevo Test</button>
                        <button class="btn" style="max-width:250px; background: var(--primary); color: white;" onclick="window.history.back()">Volver al Men&uacute;</button>
                    </div>
                </div>
            </div>

                        <!-- Sidebar Derecho (Publicidad) -->
            <aside class="hidden xl:block w-[180px] shrink-0">
                <div class="sticky top-24">
                    <div class="bg-gray-50 border-2 border-dashed border-gray-200 h-[600px] flex flex-col items-center justify-center text-center p-4 rounded-2xl">
                        <div class="text-gray-400">
                            <p class="text-[10px] font-bold uppercase tracking-widest mb-2 opacity-60">Publicidad</p>
                            <div class="w-10 h-10 bg-gray-200 rounded-full mb-4 mx-auto flex items-center justify-center">
                                <span class="text-lg">??</span>
                            </div>
                            <p class="text-[10px] italic leading-tight">Banner Lateral<br>Derecho</p>
                        </div>
                    </div>
                </div>
            </aside>

        </div>
    </div>
</main>

<script src="../../data/seneh/t13.js" defer></script>
<script src="../../assets/js/api.js" defer></script>
<script src="../../assets/js/quiz-engine.js" defer></script>
<script src="../../assets/js/analytics.js"></script>
<script src="../../assets/js/cookie-cmp.js"></script>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth-ui.js"></script>

</html>
